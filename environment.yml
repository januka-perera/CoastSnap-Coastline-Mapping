name: coastsnap
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Core scientific stack
  - numpy>=1.26
  - scipy>=1.13

  # Visualization
  - matplotlib>=3.9

  # Config
  - pyyaml>=6.0

  # Notebooks
  - jupyterlab>=4.2
  - ipywidgets>=8.1

  # Utilities
  - tqdm>=4.66

  # pip-only packages (PyTorch installed via pip to avoid conda channel conflicts)
  - pip:
      # PyTorch with CUDA 12.4 — update cu124 if your CUDA version differs
      - --index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - torchvision==0.21.0+cu124
      - torchaudio==2.6.0+cu124
      - pillow>=10.3
      - opencv-python>=4.9
      - rasterio>=1.3
      # SAM2 — installed separately as an editable install (see README Setup section)
      # Do NOT install via git+ URL; the config YAML files are not bundled in the pip package.
      # After creating this environment, run:
      #   git clone https://github.com/facebookresearch/sam2.git sam2-source
      #   pip install -e sam2-source

variables:
  KMP_DUPLICATE_LIB_OK: "TRUE"
